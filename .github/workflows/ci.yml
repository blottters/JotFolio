name: ci

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  schedule:
    - cron: '0 7 * * *'

permissions:
  contents: read

jobs:
  source:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: source
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: source/package-lock.json

      - name: Install
        run: npm ci

      - name: Unit tests
        run: npm test
        env:
          CI: true

      - name: Build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Accessibility
        run: |
          npm run preview -- --host 127.0.0.1 --port 5181 &
          npx wait-on http://127.0.0.1:5181 --timeout 30000
          A11Y_BASE_URL=http://127.0.0.1:5181 npm run a11y -- --workers=1
