<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Content Security Policy. See docs/security/contextBridge-surface.md for
      rationale per directive. 'unsafe-inline' in style-src + 'unsafe-eval' in
      script-src are documented compromises; 0.5.0 tightens both.
    -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-eval';
      worker-src 'self' blob:;
      style-src 'self' 'unsafe-inline';
      font-src 'self' data:;
      img-src 'self' data: blob:;
      connect-src 'self' https://openrouter.ai https://api.anthropic.com https://api.openai.com http://localhost:11434 http://127.0.0.1:11434 https://*.ingest.sentry.io;
      frame-src 'none';
      object-src 'none';
      base-uri 'none';
      form-action 'none';
    " />
    <title>JotFolio</title>
    <meta name="description" content="Plain files, your folders, no servers." />
    <meta name="theme-color" content="#151415" />

    <!-- Open Graph -->
    <meta property="og:title" content="JotFolio" />
    <meta property="og:description" content="Plain files, your folders, no servers." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://github.com/blottters/JotFolio" />

    <!-- TODO: ship real favicon + app icon assets (BRAND.18 / A.06).
         Placeholder favicon would itself be a slop tell — skip until real mark exists. -->
    <!-- <link rel="icon" href="/favicon.ico" sizes="any" /> -->
    <!-- <link rel="icon" type="image/png" href="/icon.png" /> -->
    <!-- <link rel="apple-touch-icon" href="/apple-touch-icon.png" /> -->
    <style>
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      html,body,#root{height:100%;overflow:hidden}
      *:focus{outline:none}
      *:focus-visible{outline:2px solid var(--ac);outline-offset:2px;border-radius:inherit}
      ::selection{background:var(--ac);color:var(--act)}
      ::-webkit-scrollbar{width:10px;height:10px}
      ::-webkit-scrollbar-track{background:transparent}
      ::-webkit-scrollbar-thumb{background:var(--br);border-radius:6px}
      ::-webkit-scrollbar-thumb:hover{background:var(--t3)}
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
